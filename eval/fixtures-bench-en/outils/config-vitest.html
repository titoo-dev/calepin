  <cal-decision>Vitest runs with a shared setup file that mocks the clock and the network by default.</cal-decision>
  <cal-fact>Coverage thresholds are enforced per package, not just globally.</cal-fact>
  <cal-link>conventions/testing-strategy</cal-link>
