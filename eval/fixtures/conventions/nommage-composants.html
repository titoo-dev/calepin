<cal-topic title="Convention de nommage des composants React" keywords="nommage, composants, react, convention, fichiers" created="2026-03-05" updated="2026-03-05">
  <cal-rule>PascalCase pour les fichiers de composants, un composant par fichier.</cal-rule>
  <cal-rule>Les hooks personnalisés commencent toujours par use.</cal-rule>
  <cal-fact>Les dossiers de composants regroupent le composant, ses styles et ses tests.</cal-fact>
  <p>Cette convention facilite la recherche par nom de fichier et l'autocomplétion des imports.</p>
</cal-topic>
