<cal-topic title="Commit message format" keywords="commit, message, convention, git, changelog" created="2026-03-06" updated="2026-03-06">
  <cal-rule>Commit subject line under 72 characters, imperative mood.</cal-rule>
  <cal-rule>Body explains why, not what — the diff already shows what.</cal-rule>
  <cal-fact>Commit messages feed an automated changelog generator.</cal-fact>
  <p>Following this format lets the changelog script group commits by type without manual tagging.</p>
</cal-topic>
