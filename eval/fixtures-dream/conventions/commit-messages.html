<cal-topic title="Format des messages de commit" keywords="commit, git, convention, message" created="2026-03-05" updated="2026-03-05">
  <cal-fact>Un corps de commit optionnel explique le pourquoi, pas le quoi.</cal-fact>
  <cal-rule>Prefixer chaque commit par type: feat, fix, chore, docs ou refactor.</cal-rule>
  <cal-rule>Le sujet du commit tient sur une ligne de moins de 72 caracteres.</cal-rule>
  <cal-file>CONTRIBUTING.md</cal-file>
  <p>Cette convention facilite la generation automatique du changelog.</p>
</cal-topic>
