<cal-topic title="Subscription plan tiers and limits" keywords="subscription, plan, tiers, limits" created="2026-03-12" updated="2026-03-12">
  <cal-decision>The free tier caps message history at 90 days; paid tiers keep full history.</cal-decision>
  <cal-fact>Upgrading a workspace mid-cycle prorates the difference for the remaining days.</cal-fact>
  <cal-link>domaine/facturation</cal-link>
  <p>The history cap is enforced at query time, not by deleting old messages.</p>
</cal-topic>
