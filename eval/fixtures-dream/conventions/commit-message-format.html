<cal-topic title="Convention de formatage des commits" keywords="commit, git, convention, message" created="2026-03-06" updated="2026-03-06">
  <cal-fact>Un corps de commit, optionnel, explique le pourquoi plutot que le quoi.</cal-fact>
  <cal-rule>Chaque commit commence par un prefixe de type : feat, fix, chore, docs ou refactor.</cal-rule>
  <cal-rule>Le sujet doit rester sous 72 caracteres sur une seule ligne.</cal-rule>
  <cal-file>CONTRIBUTING.md</cal-file>
  <p>Cette convention permet de generer le changelog automatiquement.</p>
</cal-topic>
