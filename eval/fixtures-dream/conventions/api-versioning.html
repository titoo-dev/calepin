<cal-topic title="Versionnage des APIs publiques" keywords="api, versionnage, breaking-change, compatibilite" created="2026-03-14" updated="2026-03-14">
  <cal-decision>Toute breaking change publique passe par une nouvelle version majeure (/v2).</cal-decision>
  <cal-fact>Les versions majeures sont maintenues au moins 6 mois apres depreciation.</cal-fact>
  <cal-link>conventions/dependency-updates</cal-link>
