<cal-topic title="Regles de notification aux utilisateurs" keywords="notifications, domaine, preferences" created="2026-03-22" updated="2026-03-22">
  <cal-fact>Un utilisateur absent plus de 5 minutes recoit une notification push pour un nouveau message.</cal-fact>
  <cal-rule>Ne jamais notifier un utilisateur actif dans la conversation concernee.</cal-rule>
  <cal-link>domaine/facturation</cal-link>
  <p>Ce seuil de 5 minutes a ete choisi pour eviter le spam sur des allers-retours rapides.</p>
</cal-topic>
